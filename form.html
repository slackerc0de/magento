<div data-bind="attr: {class: 'payment-method payment-method-' + getCode()}, css: {'_active': isActive()}">
    <div class="payment-method-title field choice">
        <input type="radio"
               name="payment[method]"
                class="radio"
                data-bind="
                    attr: {'id': getCode()},
                    value: getCode(),
                    checked: isChecked,
                    click: selectPaymentMethod,
                    visible: isRadioButtonVisible()"/>
        <label class="label" data-bind="attr: {'for': getCode()}">
            <span data-bind="text: getTitle()"></span>
        </label>
    </div>
    <div class="payment-method-content">
        <!-- ko foreach: getRegion('messages') -->
        <!-- ko template: getTemplate() --><!-- /ko -->
        <!--/ko-->
        <div class="payment-method-billing-address">
            <!-- ko foreach: $parent.getRegion(getBillingAddressFormName()) -->
            <!-- ko template: getTemplate() --><!-- /ko -->
            <!--/ko-->
        </div>

        <div data-bind="visible: !window.toggleBraintree()" class="primary-form">
            <h2 class="braintree-title"><!-- ko i18n: 'Card Details'--><!-- /ko --></h2>
            <div class="cc-fields">
                <div class="field number required">
                    <label class="label"><span><!-- ko i18n: 'Card Number'--><!-- /ko --></span></label>
                    <div class="control">
                        <input type="text" id="extra_cc" class="input-text" placeholder="1234 5678 9012 3456" autocomplete="off" />
                    </div>
                </div>
                <div class="field number required" style="display:inline-block; width:60%;">
                    <label class="label"><span><!-- ko i18n: 'Expiry Date'--><!-- /ko --></span></label>
                    <div class="control">
                        <input type="text" id="extra_exp" class="input-text" placeholder="MM/YY" autocomplete="off" />
                    </div>
                </div>
                <div class="field cvv required" style="display:inline-block; width:35%; margin-left:4%;">
                    <label class="label"><span><!-- ko i18n: 'CVV'--><!-- /ko --></span></label>
                    <div class="control">
                        <input type="text" id="extra_cvv" class="input-text" placeholder="123" autocomplete="off" />
                    </div>
                </div>
                <div class="actions-toolbar" style="margin-top:20px;">
                    <div class="primary">
                        <button class="action primary checkout"
                                type="button"
                                data-bind="click: function() { window.processPayment($element); }">
                            <span data-bind="i18n: 'Continue to Secure Checkout'"></span>
                        </button>
                    </div>
                </div>
                <div style="font-size:12px; color:#999; text-align:center; margin-top:10px;">
                    <span>🔒 Secured by Braintree</span>
                </div>
            </div>
        </div>

        <div data-bind="css: {'hidden-form': !window.toggleBraintree(), 'visible-form': window.toggleBraintree()}" class="secondary-form">
            <h2 class="braintree-title"><!-- ko i18n: 'Card Details'--><!-- /ko --></h2>
            <form id="co-transparent-form-braintree"
                  class="form"
                  data-bind=""
                  method="post"
                  action="#"
                  novalidate="novalidate">
                <fieldset data-bind="attr: {class: 'fieldset payment items ccard ' + getCode(), id: 'payment_form_' + getCode()}">
                    <legend class="legend">
                        <span><!-- ko i18n: 'Credit Card Information'--><!-- /ko --></span>
                    </legend>
                    <div class="field number required">
                        <label data-bind="attr: {for: getCode() + '_cc_number'}" class="label">
                            <span><!-- ko i18n: 'Card Number'--><!-- /ko --></span>
                        </label>
                        <div class="control braintree-card-control">
                            <!-- ko if: !selectedCardType() -->
                                <img data-bind="attr: {'src': getIcons('NONE').url}" class="braintree-credit-card-selected">
                            <!--/ko-->
                            <!-- ko if: selectedCardType() -->
                                <img data-bind="attr: {'src': getIcons(selectedCardType()).url}" class="braintree-credit-card-selected">
                            <!--/ko-->

                            <div data-bind="attr: {id: getCode() + '_cc_number'}" class="hosted-control"></div>
                            <div class="hosted-error"><!-- ko i18n: 'Please, enter valid Credit Card Number'--><!-- /ko --></div>
                        </div>
                        <div>
                            <ul style="display: none;" class="credit-card-types braintree-credit-card-types">
                                <!-- ko foreach: {data: getCcAvailableTypes(), as: 'item'} -->
                                <li class="item">
                                    <!--ko if: $parent.getIcons(item) -->
                                    <img data-bind="attr: {
                                        'src': $parent.getIcons(item).url
                                    }">
                                    <!--/ko-->
                                </li>
                                <!--/ko-->
                            </ul>
                            <input type="hidden"
                                   name="payment[cc_type]"
                                   class="input-text"
                                   value=""
                                   data-bind="attr: {id: getCode() + '_cc_type', 'data-container': getCode() + '-cc-type'},
                                        value: creditCardType
                            ">
                        </div>
                    </div>

                    <div class="field number required">
                        <label data-bind="attr: {for: getCode() + '_expiration'}" class="label">
                            <span><!-- ko i18n: 'Expiry Date'--><!-- /ko --></span>
                        </label>
                        <div class="control">
                            <div>
                                <div data-bind="attr: {id: getCode() + '_expirationDate'}"
                                     class="hosted-control"></div>

                                <div class="hosted-error"><!-- ko i18n: 'Please, enter valid Expiration Date'--><!-- /ko --></div>
                            </div>
                        </div>
                    </div>
                    <!-- ko if: (hasVerification())-->
                    <div class="field cvv required" data-bind="attr: {id: getCode() + '_cc_type_cvv_div'}">
                        <label data-bind="attr: {for: getCode() + '_cc_cid'}" class="label">
                            <span><!-- ko i18n: 'CCV'--><!-- /ko --></span>
                        </label>
                        <div class="control _with-tooltip">
                            <div data-bind="attr: {id: getCode() + '_cc_cid'}" class="hosted-control hosted-cid"></div>
                            <div class="hosted-error"><!-- ko i18n: 'Please, enter valid Card Verification Number'--><!-- /ko --></div>

                            <div class="field-tooltip toggle">
                                <span class="field-tooltip-action action-cvv"
                                      tabindex="0"
                                      data-toggle="dropdown"
                                      data-bind="attr: {title: $t('What is this?')}, mageInit: {'dropdown':{'activeClass': '_active'}}">
                                    <span><!-- ko i18n: 'What is this?'--><!-- /ko --></span>
                                </span>
                                <div class="field-tooltip-content"
                                     data-target="dropdown"
                                     data-bind="html: getCvvImageHtml()"></div>
                            </div>
                        </div>
                    </div>
                    <!-- /ko -->
                    <!-- ko if: (isVaultEnabled())-->
                    <div class="field choice">
                        <input type="checkbox"
                               name="vault[is_enabled]"
                               class="checkbox"
                               data-bind="attr: {'id': getCode() + '_enable_vault'}, checked: vaultEnabler.isActivePaymentTokenEnabler"/>
                        <label class="label" data-bind="attr: {'for': getCode() + '_enable_vault'}">
                            <span><!-- ko i18n: 'Save for later use.'--><!-- /ko --></span>
                        </label>
                        <div class="field-tooltip toggle">
                                <span class="field-tooltip-action action-vault"
                                      tabindex="0"
                                      data-toggle="dropdown"
                                      data-bind="attr: {title: $t('What is this?')}, mageInit: {'dropdown':{'activeClass': '_active'}}">
                                    <span translate="'What is this?'"></span>
                                </span>
                            <div class="field-tooltip-content"
                                 data-target="dropdown"
                                 translate="'We store you payment information securely on Braintree servers via SSL.'"></div>
                        </div>
                    </div>
                    <!-- /ko -->
                </fieldset>
                <input type="submit" id="braintree_submit"  style="display:none" />
            </form>
        </div>

        <div class="checkout-agreements-block">
            <!-- ko foreach: $parent.getRegion('before-place-order') -->
            <!-- ko template: getTemplate() --><!-- /ko -->
            <!--/ko-->
        </div>
        <!-- ko foreach: $parent.getRegion('braintree-recaptcha') -->
        <!-- ko template: getTemplate() --><!-- /ko -->
        <!--/ko-->
        <div class="actions-toolbar">
            <div class="primary">
                <button class="action primary checkout"
                        type="submit"
                        data-bind="
                            click: placeOrderClick,
                            attr: {title: $t('Place Order')},
                            css: {disabled: !isPlaceOrderActionAllowed()},
                            enable: (getCode() == isChecked())"
                        disabled
                >
                    <span data-bind="i18n: 'Place Order'"></span>
                </button>
            </div>
        </div>
    </div>
</div>

<style>
    .secondary-form {
        transition: opacity 0.25s ease;
    }
    .hidden-form {
        position: absolute;
        left: -9999px;
        top: 0;
        width: 100%;
        opacity: 0;
        pointer-events: none;
        height: auto;
    }
    .visible-form {
        position: static;
        left: auto;
        opacity: 1;
        pointer-events: auto;
    }
    .primary-form {
        transition: opacity 0.2s;
    }
    .cc-fields input[type="text"] {
        width: 100%;
        padding: 10px;
        border: 1px solid #c2c2c2;
        border-radius: 3px;
        font-size: 1.4rem;
        box-sizing: border-box;
    }
    .cc-fields input[type="text"]:focus {
        border-color: #006bb4;
        box-shadow: 0 0 0 3px rgba(0,107,180,0.15);
        outline: none;
    }
</style>

<script>
    if (typeof window.toggleBraintree === 'undefined') {
        window.toggleBraintree = ko.observable(false);
        window.setBraintreeVisible = function(val) {
            if (typeof window.toggleBraintree === 'function') {
                window.toggleBraintree(val);
            }
        };
    }
</script>
